<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Home of the Hermegeddon GitHub organization.">
  <title>Hermegeddon</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a12;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text: #f7f2ff;
      --muted: #c9c1d9;
      --accent: #ff5c7a;
      --accent-2: #7c5cff;
      --accent-3: #35d0ba;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 92, 255, 0.35), transparent 30rem),
        radial-gradient(circle at 80% 15%, rgba(53, 208, 186, 0.22), transparent 26rem),
        radial-gradient(circle at 50% 90%, rgba(255, 92, 122, 0.25), transparent 28rem),
        var(--bg);
    }

    main {
      width: min(100%, 56rem);
      padding: clamp(2rem, 6vw, 5rem);
      border: 1px solid var(--panel-border);
      border-radius: 2rem;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
      box-shadow: 0 2rem 8rem rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0 0 1.5rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--muted);
      background: var(--panel);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pulse {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 999px;
      background: var(--accent-3);
      box-shadow: 0 0 1.25rem var(--accent-3);
    }

    h1 {
      margin: 0;
      max-width: 11ch;
      font-size: clamp(3.5rem, 12vw, 8.5rem);
      line-height: 0.88;
      letter-spacing: -0.08em;
    }

    p {
      max-width: 42rem;
      margin: 1.75rem 0 0;
      color: var(--muted);
      font-size: clamp(1.1rem, 2vw, 1.45rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2.25rem;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0.8rem 1.1rem;
      border: 1px solid transparent;
      border-radius: 999px;
      color: #130b18;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 1rem 2.5rem rgba(124, 92, 255, 0.32);
    }

    .button.secondary {
      color: var(--text);
      background: var(--panel);
      border-color: var(--panel-border);
      box-shadow: none;
    }

    footer {
      margin-top: 3rem;
      color: rgba(247, 242, 255, 0.56);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow"><span class="pulse" aria-hidden="true"></span> GitHub organization</div>
    <h1>Hermegeddon</h1>
    <p>
      A small starting point for the Hermegeddon organization: experiments,
      tools, infrastructure, and whatever survives first contact with reality.
    </p>
    <div class="actions" aria-label="Primary links">
      <a class="button" href="https://github.com/hermegeddon">Visit the GitHub organization</a>
      <a class="button secondary" href="https://github.com/hermegeddon/hermegeddon.github.io">View this site repository</a>
    </div>
    <footer>Published at hermegeddon.dev with GitHub Pages.</footer>
  </main>
</body>
</html>
